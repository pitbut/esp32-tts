services:
  - type: web
    name: esp32-tts
    runtime: python
    buildCommand: "apt-get update && apt-get install -y ffmpeg && pip install -r requirements.txt"  # apt-get здесь обычно не работает в native!
    startCommand: "python -m gunicorn app:app --bind 0.0.0.0:$PORT --timeout 60"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
